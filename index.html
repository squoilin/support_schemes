            border-radius: 8px;

            height: 18px;

            margin-right: 8px;

            border-radius: 3px;

            left: 50%;
            transform: translateX(-50%);

                "ground": {
                        "scheme": "Regional Green Certificates.",
                        "ref": ""
                },
                "onshore": {
                        "scheme": "Regional Green Certificates.",
                        "ref": ""
                },
                "offshore": {
                        "scheme": "Federal Two-way CfDs via tenders.",
                        "ref": "Federal Ministry of Energy",
                        "comment": "Allocated via competitive auctions."
                },
                "co2": {
                        "scheme": "EU ETS",
                        "ref": "EU Directive",
                        "comment": "Active primary mechanism."
                }
        }
};
    
    function classifyScheme(text, viewType) {
        if (!text) return CATEGORIES.NO_DATA;
        let t = text.toLowerCase();
        if (t.includes('n/a') || t.includes('unknown') || t === '-') return CATEGORIES.NO_DATA;
        
        if (viewType === 'co2') {
            if (t.includes('tax') || t.includes('levy') || t.includes('pricing') || t.includes('charge')) return CATEGORIES.ETS_TAX;
            return CATEGORIES.ETS_ONLY;
        }
        
        if (viewType === 'rooftop') {
            if (t.includes('net billing') || t.includes('net metering') || t.includes('settlement')) return CATEGORIES.NET_BILLING_METERING;
            if (t.includes('subsidies') || t.includes('grants') || t.includes('tax credit')) return CATEGORIES.SUBSIDIES;
            if (t.includes('fit') || t.includes('feed-in tariff') || t.includes('smart export') || t.includes('gross settlement')) return CATEGORIES.FIT;
            return CATEGORIES.MIXED;
        }
        
        if (t.includes('cfd') || t.includes('premium')) return CATEGORIES.CFD_FIP;
        if (t.includes('merchant') || t.includes('ppa')) return CATEGORIES.MERCHANT;
        if (t.includes('tender') || t.includes('auction')) return CATEGORIES.TENDERS;
        if (t.includes('quota') || t.includes('certificate')) return CATEGORIES.QUOTA_CERT;
        if (t.includes('fit') || t.includes('feed-in tariff')) return CATEGORIES.FIT;
        
        return CATEGORIES.MIXED;
    }

    let currentView = 'ground';

    document.getElementById('tech-select').addEventListener('change', function(e) {
        currentView = e.target.value;
        if(geojsonLayer) {
            geojsonLayer.eachLayer(function(layer) {
                geojsonLayer.resetStyle(layer);
            });
            updateLegend();
        }
    });

    function getCountryInfo(isoCode) {
        const d = rawData[isoCode];
        if (d) {
            const getScheme = (key) => d[key] ? d[key].scheme : 'Unknown';
            let activeText = "No data mapped.";
            
            if (currentView === 'ground') activeText = getScheme('ground');
            else if (currentView === 'rooftop') activeText = getScheme('rooftop');
            else if (currentView === 'onshore') activeText = getScheme('onshore');
            else if (currentView === 'offshore') activeText = getScheme('offshore');
            else if (currentView === 'co2') activeText = getScheme('co2');

            let activeCategory = classifyScheme(activeText, currentView);

            return {
                name: d.Country,
                activeScheme: activeText,
                category: activeCategory,
                fullData: d
            };
        } else {
            return { name: isoCode, category: CATEGORIES.NO_DATA, activeScheme: "No data", fullData: {} };
        }
    }

    var info = L.control({position: 'topright'});
    info.onAdd = function (map) { this._div = L.DomUtil.create('div', 'info-panel'); this.update(); return this._div; };
    info.update = function (props) {
        if (!props) {
            this._div.innerHTML = '<h4>RES Support Schemes</h4>Hover over a region...';
            return;
        }
        const iso = (props.LEVL_CODE === 1) ? props.NUTS_ID : (props.NUTS_ID || props.CNTR_ID);
        const data = getCountryInfo(iso);
        const name = data.name || props.NAME_LATN || props.NAME_ENGL;
        
        if (data.category === CATEGORIES.NO_DATA && !data.fullData.Country) {
            this._div.innerHTML = `<h4>${name}</h4><p>Information not available or not covered.</p>`;
            return;
        }

        const f = data.fullData;
        this._div.innerHTML = `<h4>${name}</h4>
            <p><strong>Selected View Category:</strong> <span style="color:${COLORS[data.category]}"><b>${data.category}</b></span></p>
            <hr>
            <p><strong>Rooftop PV:</strong> ${f.rooftop ? f.rooftop.scheme : ''}</p>
            <p><strong>Ground PV:</strong> ${f.ground ? f.ground.scheme : ''}</p>
            <p><strong>Onshore Wind:</strong> ${f.onshore ? f.onshore.scheme : ''}</p>
            <p><strong>Offshore Wind:</strong> ${f.offshore ? f.offshore.scheme : ''}</p>
            <p style="margin-top: 8px; border-top: 1px dotted #ccc; padding-top: 5px;"><strong>CO2 Mechanism:</strong> ${f.co2 ? f.co2.scheme : ''}</p>
        `;
    };
    info.addTo(map);

    
    function style(feature) {
        const iso = (feature.properties.LEVL_CODE === 1) ? feature.properties.NUTS_ID : (feature.properties.NUTS_ID || feature.properties.CNTR_ID);
        const data = getCountryInfo(iso);
        let fillColor = COLORS[data.category] || COLORS[CATEGORIES.NO_DATA];
        let fillOpacity = (data.category === CATEGORIES.NO_DATA) ? 0.2 : 0.8;
        return { fillColor: fillColor, weight: 1.5, opacity: 1, color: '#ffffff', fillOpacity: fillOpacity };
    }

    function highlightFeature(e) {
        var layer = e.target;
        layer.setStyle({ weight: 2, color: '#222', fillOpacity: 1 });
        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) layer.bringToFront();
        info.update(layer.feature.properties);
    }

    function resetHighlight(e) { geojsonLayer.resetStyle(e.target); info.update(); }
    function onEachFeature(feature, layer) { layer.on({ mouseover: highlightFeature, mouseout: resetHighlight }); }

    var geojsonLayer;
    
    Promise.all([
        fetch('https://gisco-services.ec.europa.eu/distribution/v2/countries/geojson/CNTR_RG_20M_2024_4326.geojson').then(r => r.json()),
        fetch('https://gisco-services.ec.europa.eu/distribution/v2/nuts/geojson/NUTS_RG_20M_2024_4326_LEVL_1.geojson').then(r => r.json())
    ]).then(([nuts0, nuts1]) => {
        var features = nuts0.features.filter(f => f.properties.CNTR_ID !== 'BE');
        var beRegions = nuts1.features.filter(f => f.properties.CNTR_CODE === 'BE');
        features = features.concat(beRegions);
        
        var combinedGeoJSON = { "type": "FeatureCollection", "features": features };
        geojsonLayer = L.geoJson(combinedGeoJSON, {
            style: style,
            onEachFeature: onEachFeature
        }).addTo(map);
        
        updateLegend();
    });

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        this._div = L.DomUtil.create('div', 'legend');
        return this._div;
    };
    function updateLegend() {
        if(!legend._div) return;
        let html = '<strong>Categories (Current View)</strong><br><br>';
        
        let usedCats = new Set();
        if(geojsonLayer) {
            geojsonLayer.eachLayer(function(layer) {
                const iso = layer.feature.properties.NUTS_ID || layer.feature.properties.CNTR_ID;
                usedCats.add(getCountryInfo(iso).category);
            });
        }
        
        for (const [key, label] of Object.entries(CATEGORIES)) {
            if(usedCats.has(label) || label === CATEGORIES.NO_DATA) {
                html += '<i style="background:' + COLORS[label] + '"></i> ' + label + '<br>';
            }
        }
        legend._div.innerHTML = html;
    }
    legend.addTo(map);

</script>
</body>
</html>
